<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>共立映像 搬入出予定</title>

<style>

body{
  margin:0;
  background:#0d1117;
  color:white;
  font-family:
    -apple-system,
    BlinkMacSystemFont,
    "Hiragino Sans",
    "Yu Gothic",
    sans-serif;
}

.header{
  background:#161b22;
  padding:15px;
  text-align:center;
  position:sticky;
  top:0;
  z-index:100;
}

.title{
  font-size:24px;
  font-weight:bold;
}

.clock{
  font-size:16px;
  color:#cbd5e1;
  margin-top:5px;
}

#schedule{
  padding:10px;
}

.schedule-row{
  background:#161b22;
  border-left:5px solid #2563eb;
  border-radius:12px;
  padding:15px;
  margin-bottom:12px;
}

.time{
  font-size:22px;
  font-weight:bold;
  color:#60a5fa;
}

.project{
  font-size:20px;
  font-weight:bold;
  margin-top:10px;
  white-space:normal;
  word-break:break-word;
}

.content{
  margin-top:10px;
  font-size:17px;
  color:#d1d5db;
}

.vehicle{
  margin-top:5px;
  font-size:15px;
  color:#9ca3af;
}

.driver{
  margin-top:5px;
  font-size:15px;
  color:#facc15;
}

.no-data{
  height:70vh;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#6b7280;
  font-size:28px;
  font-weight:bold;
}

</style>
</head>

<body>

<div class="header">

  <div class="title">
    共立映像 搬入出予定
  </div>

  <div class="clock" id="clock">
  </div>

<div style="padding:10px;text-align:center;background:#161b22;">
  <input
    type="date"
    id="datePicker"
    style="
      font-size:16px;
      padding:8px;
      border-radius:8px;
      border:none;
    "
  >
</div>

</div>

<div id="schedule">
</div>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbwIJvhY0UJzmc819AHSJOoreiKeaTpTiJX6Cn0Q7V3L91TC-hzpr9_WpTnOAbnGrxAn-g/exec";

function updateClock(){

  const now = new Date();

  const week = ["日","月","火","水","木","金","土"];

  document.getElementById("clock").innerHTML =
    now.getFullYear() + "年" +
    (now.getMonth()+1) + "月" +
    now.getDate() + "日(" +
    week[now.getDay()] + ") " +
    now.toLocaleTimeString("ja-JP");

}

async function loadData(){


  document.getElementById("schedule").innerHTML =
    '<div class="no-data">読み込み中...</div>';

const selectedDate =
  document.getElementById("datePicker").value;

const url =
  selectedDate
    ? API_URL + "?date=" + selectedDate
    : API_URL;

const res = await fetch(url);
  const data = await res.json();

  let html = "";

  if(data.schedule.length === 0){

    html =
      '<div class="no-data">本日の搬入出予定はありません</div>';

  }else{

    data.schedule.forEach(item=>{

      html += `
        <div class="schedule-row">

          <div class="time">
            ${
              item.time === "23:59"
                ? "未定"
                : item.time
            }
          </div>

          <div class="project">
            ${item.project}
          </div>

          <div class="content">
            ${item.content}
          </div>

          <div class="vehicle">
            ${item.vehicle}
          </div>

	  <div class="driver">
	    ${item.driver || ""}
	  </div>

        </div>
      `;

    });

  }

  document.getElementById("schedule").innerHTML = html;

}

updateClock();

const today = new Date();
const yyyy = today.getFullYear();
const mm = String(today.getMonth()+1).padStart(2,"0");
const dd = String(today.getDate()).padStart(2,"0");

document.getElementById("datePicker").value =
  `${yyyy}-${mm}-${dd}`;

document
  .getElementById("datePicker")
  .addEventListener("change", loadData);


loadData();

setInterval(updateClock,1000);
setInterval(loadData,300000);

</script>

</body>
</html>
