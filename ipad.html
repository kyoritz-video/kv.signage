<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>共立映像搬入出予定</title>

<style>

body{
  margin:0;
  background:#0d1117;
  color:white;

  font-family:
    -apple-system,
    BlinkMacSystemFont,
    "Hiragino Sans",
    "Yu Gothic",
    sans-serif;

  overflow:hidden;
}
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#161b22;
  padding:20px 40px;
}

.logo{
  font-size:34px;
  font-weight:bold;
}

.logo,
.clock{
  font-family:
    -apple-system,
    BlinkMacSystemFont,
    "Hiragino Sans",
    sans-serif;

  font-weight:700;
}

.main{
  display:grid;
  grid-template-columns:65% 35%;
  height:calc(100vh - 120px);
}

.left{
  padding:15px 25px;
  overflow:hidden;
}

.right{
  padding:15px;
  display:flex;
  flex-direction:column;
}

.title{
  font-size:48px;
  border-bottom:none;
  padding-bottom:10px;
  margin-bottom:20px;
}

.schedule-row{
  display:grid;

  grid-template-columns:
    90px
    220px
    140px
    140px
    150px;

  column-gap:8px;

  font-size:32px;
  font-weight:bold;
  margin-bottom:14px;
  align-items:center;

  background:#161b22;
  border-left:8px solid #2563eb;
  border-radius:10px;

  padding:14px 2px 14px 10px;
  min-height:60px;
}

.schedule-row > div{
  min-width:0;
  white-space:nowrap;
  overflow:hidden;
}

.schedule-cell{
  overflow:hidden;
  white-space:nowrap;
  position:relative;
  min-width:0;
}


.schedule-scroll{
  display:inline-block;
  white-space:nowrap;
}

.schedule-scroll.animate{
  animation:projectScroll 15s linear infinite;
}

.driver-scroll.animate{
  animation:driverMarquee 12s linear infinite;
}

@keyframes driverMarquee{

  0%{
    transform:translateX(40%);
  }

  20%{
    transform:translateX(40%);
  }

  100%{
    transform:translateX(-50%);
  }

}

.driver-scroll.animate{
  animation:driverMarquee 12s linear infinite;
}


@keyframes projectScroll{

  0%{
    transform:translateX(0);
  }

  20%{
    transform:translateX(0);
  }

  100%{
    transform:translateX(-50%);
  }

}

.schedule-row:nth-child(odd){
  background:#1a1f28;
}

.schedule-row:nth-child(even){
  background:#202734;
}

.card{
  background:#161b22;
  border-radius:12px;
  padding:18px;
  margin-bottom:20px;
  position:relative;
}

.card-title{
  font-size:36px;
  margin-bottom:15px;
  border-bottom:1px solid #444;
  padding-bottom:10px;
}

.visitor-row{
  font-size:18px;
  margin-bottom:12px;
}

#schedule{
  animation:autoScroll 60s linear infinite;
}

#visitors{
  min-height:60px;
}

#weather{
  text-align:center;
  margin-top:0;
}

.notice{
  position:fixed;
  bottom:0;
  width:100%;
  height:60px;
  background:#2563eb;
  display:flex;
}

.notice-title{
  width:220px;
  background:#1d4ed8;

  display:flex;
  align-items:center;
  justify-content:center;

  font-size:30px;
  font-weight:bold;
}

.notice-scroll{
  flex:1;
  position:relative;
  overflow:hidden;
  white-space:nowrap;
}

.notice-scroll::before{
  content:"";
  position:absolute;
  left:0;
  top:0;
  width:15px;
  height:100%;
  z-index:10;
  pointer-events:none;

  background:linear-gradient(
    to right,
    rgba(37,99,235,0.7),
    rgba(37,99,235,0)
  );
}

.notice-text{
  position:absolute;
  left:100%;
  white-space:nowrap;
  line-height:60px;
  font-size:34px;
  font-weight:bold;

  animation:none;
}

@keyframes scroll{

  from{
    transform:translateX(0);
  }

  to{
    transform:translateX(calc(-100vw - 100%));
  }

}

@media screen and (max-width:1400px){

  .logo{
    font-size:38px;
  }

.clock{
  font-size:38px;
  font-weight:700;
  min-width:430px;
  text-align:right;
  font-variant-numeric:tabular-nums;
}

.schedule-row{
  display:grid;

  grid-template-columns:
    90px
    220px
    140px
    140px
    180px;

  column-gap:10px;

  font-size:32px;
  font-weight:bold;
  margin-bottom:14px;
  align-items:center;

  background:#161b22;
  border-left:8px solid #2563eb;
  border-radius:10px;

  padding:14px 0 14px 10px;
  min-height:60px;
}
  .card-title{
    font-size:26px;
  }

  .visitor-row{
    font-size:20px;
  }

  .notice-title{
    font-size:26px;
  }

}

#screenSaver{
  display:flex;

  position:fixed;
  inset:0;
  z-index:9999;

  background:#ffffff;
  color:#111827;

  align-items:center;
  justify-content:center;
  flex-direction:column;

  opacity:0;
  visibility:hidden;

  transition:
    opacity 1.5s ease,
    visibility 1.5s ease;

  pointer-events:none;
}

#screenSaverClock{

  font-size:140px;
  font-weight:800;

  letter-spacing:4px;

  font-variant-numeric:tabular-nums;
}

#screenSaver.show{
  opacity:1;
  visibility:visible;
}


#screenSaverDate{

  margin-top:25px;

  font-size:36px;

  font-weight:600;

  color:#4b5563;

}


.info-rotation-card{
  min-height:112px;
  padding:12px 16px;
  overflow:hidden;
}

.info-panel{
  display:none;
  opacity:0;
  transform:translateY(8px);
  transition:opacity .6s ease, transform .6s ease;
}

.info-panel.active{
  display:block;
  opacity:1;
  transform:translateY(0);
}

.info-header{
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:8px;
}

.info-icon{
  font-size:30px;
  line-height:1;
}

.info-title{
  font-size:25px;
  font-weight:700;
}

.info-main{
  font-size:26px;
  font-weight:700;
  margin-bottom:4px;
}

.info-sub{
  font-size:16px;
  color:#9ca3af;
  line-height:1.3;
}

.info-dots{
  display:flex;
  justify-content:center;
  gap:7px;
  margin-top:8px;
}

.info-dot{
  width:8px;
  height:8px;
  border-radius:50%;
  background:#4b5563;
}

.info-dot.active{
  background:#60a5fa;
}

.info-area{
  margin-left:auto;
  font-size:14px;
  color:#9ca3af;
  white-space:nowrap;
}

.heat-alert{
  border-left:6px solid #c026d3;
  padding-left:12px;
  background:linear-gradient(90deg, rgba(192,38,211,.16), rgba(192,38,211,0) 58%);
}

.heat-alert .info-icon,
.heat-alert .info-title,
.heat-alert .info-main{
  color:#e879f9;
}

.heat-alert .info-sub{
  color:#f5d0fe;
  font-weight:600;
}

.heat-badge{
  margin-left:auto;
  padding:3px 9px;
  border-radius:999px;
  background:#a21caf;
  color:#fff;
  font-size:14px;
  font-weight:800;
  letter-spacing:.06em;
  animation:heatPulse 1.8s ease-in-out infinite;
}

.heat-dot{
  background:#c026d3 !important;
}

@keyframes heatPulse{
  0%,100%{ opacity:1; box-shadow:0 0 0 rgba(192,38,211,0); }
  50%{ opacity:.72; box-shadow:0 0 14px rgba(192,38,211,.55); }
}

.heat-meta{
  display:flex;
  align-items:baseline;
  gap:12px;
  margin-bottom:4px;
}

.heat-index-label{
  font-size:14px;
  color:#d8b4fe;
  font-weight:700;
}

.heat-index-value{
  font-size:27px;
  line-height:1;
  color:#f0abfc;
  font-weight:900;
  font-variant-numeric:tabular-nums;
}

.heat-index-unit{
  font-size:14px;
  color:#d8b4fe;
  font-weight:700;
}

.heat-updated{
  margin-left:auto;
  font-size:13px;
  color:#c4b5fd;
  white-space:nowrap;
  font-variant-numeric:tabular-nums;
}

.traffic-alert{
  border-left:6px solid #ef4444;
  padding-left:12px;
}

.alert-badge{
  margin-left:auto;
  padding:3px 8px;
  border-radius:999px;
  background:#dc2626;
  color:#fff;
  font-size:14px;
  font-weight:800;
  letter-spacing:.04em;
  animation:alertPulse 1.8s ease-in-out infinite;
}

.traffic-alert .info-icon,
.traffic-alert .info-title,
.traffic-line{
  color:#f87171;
}

.traffic-detail{
  color:#fca5a5;
  font-weight:600;
}

.alert-dot{
  background:#ef4444 !important;
}

@keyframes alertPulse{
  0%,100%{ opacity:1; }
  50%{ opacity:.55; }
}

</style>

</head>

<body>

<div class="header">

  <div class="logo" id="company">
    今日の搬入出予定
  </div>

  <div class="clock" id="clock">
  </div>

</div>

<div class="main">

  <div class="left">

    <div class="title" id="scheduleTitle">
    </div>

    <div id="schedule">
    </div>

  </div>

<div class="right">

  <div class="card weather-card">

    <div id="weather">
      読み込み中...
    </div>

  </div>



  <div class="card info-rotation-card">

    <div class="info-panel active heat-alert" id="heatPanel" data-index="0">
      <div class="info-header">
        <div class="info-icon">☀</div>
        <div class="info-title">熱中症情報</div>
        <div class="info-area">東京都心</div>
        <div class="heat-badge" id="heatBadge">取得中</div>
      </div>
      <div class="heat-meta">
        <span class="heat-index-label">暑さ指数</span>
        <span class="heat-index-value" id="heatIndexValue">--.-</span>
        <span class="heat-index-unit">WBGT</span>
        <span class="heat-updated" id="heatUpdated">取得中</span>
      </div>
      <div class="info-main" id="heatMain">暑さ指数を取得しています</div>
      <div class="info-sub" id="heatSub">東京都心の気象データから推定しています</div>
    </div>

    <div class="info-panel" id="rainPanel" data-index="1">
      <div class="info-header">
        <div class="info-icon">☔</div>
        <div class="info-title">雨雲情報</div>
        <div class="info-area">東京都心</div>
      </div>
      <div class="info-main" id="rainMain">降水予測を取得しています</div>
      <div class="info-sub" id="rainSub">取得中</div>
    </div>


    <div class="info-dots">
      <span class="info-dot active heat-dot"></span>
      <span class="info-dot"></span>
    </div>

  </div>

  <div class="card visitor-card">

    <div class="card-title">
      納品・引取
    </div>

    <div id="visitors">
    </div>

  </div>

</div>
<div class="notice">

<div class="notice-title">
  information
</div>

  <div class="notice-scroll">

    <div
      class="notice-text"
      id="notice">
    </div>

  </div>

</div>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbzHLMweMXbWOIPgst29lFFuSmNDCQwDvklfYDH7pqiYfU-PYrZQflSyRYPXwoi-TgrJsA/exec";


let currentInfoPanel = 0;

function rotateInfoPanel(){
  const panels = document.querySelectorAll(".info-panel");
  const dots = document.querySelectorAll(".info-dot");

  if(!panels.length) return;

  panels.forEach((panel,index)=>{
    panel.classList.toggle("active", index === currentInfoPanel);
  });

  dots.forEach((dot,index)=>{
    dot.classList.toggle("active", index === currentInfoPanel);
  });

  currentInfoPanel = (currentInfoPanel + 1) % panels.length;
}


function formatHm(dateValue){
  const d = dateValue ? new Date(dateValue) : new Date();
  return String(d.getHours()).padStart(2,"0") + ":" +
         String(d.getMinutes()).padStart(2,"0");
}

function estimateWbgt(tempC, humidity, solarWm2, windKmh){
  // 気温・湿度・日射・風速による屋外WBGTの簡易推定
  const solarKw = Math.max(0, Number(solarWm2) || 0) / 1000;
  const windMs = Math.max(0, Number(windKmh) || 0) / 3.6;
  const t = Number(tempC);
  const rh = Number(humidity);

  const wbgt =
    0.735 * t +
    0.0374 * rh +
    0.00292 * t * rh +
    7.619 * solarKw -
    4.557 * solarKw * solarKw -
    0.0572 * windMs -
    4.064;

  return Math.max(-10, Math.min(50, wbgt));
}

function getHeatLevel(wbgt){
  if(wbgt >= 31){
    return {
      label:"危険", color:"#c026d3", soft:"#e879f9", pale:"#f5d0fe",
      background:"linear-gradient(90deg, rgba(192,38,211,.16), rgba(192,38,211,0) 58%)",
      main:"外出は炎天下を避けてください",
      sub:"水分・塩分を補給し、屋外作業は十分な休憩を確保してください"
    };
  }
  if(wbgt >= 28){
    return {
      label:"厳重警戒", color:"#ef4444", soft:"#f87171", pale:"#fecaca",
      background:"linear-gradient(90deg, rgba(239,68,68,.15), rgba(239,68,68,0) 58%)",
      main:"激しい運動や長時間の屋外作業は控えてください",
      sub:"こまめな水分・塩分補給と休憩を徹底してください"
    };
  }
  if(wbgt >= 25){
    return {
      label:"警戒", color:"#fb923c", soft:"#fdba74", pale:"#fed7aa",
      background:"linear-gradient(90deg, rgba(251,146,60,.14), rgba(251,146,60,0) 58%)",
      main:"積極的に休憩と水分補給を行ってください",
      sub:"体調の変化に注意し、無理な作業は避けてください"
    };
  }
  if(wbgt >= 21){
    return {
      label:"注意", color:"#facc15", soft:"#fde047", pale:"#fef08a",
      background:"linear-gradient(90deg, rgba(250,204,21,.12), rgba(250,204,21,0) 58%)",
      main:"こまめな水分補給を心がけてください",
      sub:"長時間の作業では定期的に休憩してください"
    };
  }
  return {
    label:"ほぼ安全", color:"#22c55e", soft:"#4ade80", pale:"#bbf7d0",
    background:"linear-gradient(90deg, rgba(34,197,94,.11), rgba(34,197,94,0) 58%)",
    main:"現在の暑さ指数は低い状態です",
    sub:"作業中も水分補給を忘れないようにしてください"
  };
}

function applyHeatDisplay(wbgt, acquiredTime){
  const level = getHeatLevel(wbgt);
  const panel = document.getElementById("heatPanel");
  const badge = document.getElementById("heatBadge");
  const value = document.getElementById("heatIndexValue");
  const updated = document.getElementById("heatUpdated");
  const main = document.getElementById("heatMain");
  const sub = document.getElementById("heatSub");
  const icon = panel.querySelector(".info-icon");
  const title = panel.querySelector(".info-title");
  const dot = document.querySelector(".heat-dot");

  panel.style.borderLeftColor = level.color;
  panel.style.background = level.background;
  badge.textContent = level.label;
  badge.style.background = level.color;
  value.textContent = wbgt.toFixed(1);
  value.style.color = level.soft;
  updated.textContent = "取得 " + formatHm(acquiredTime);
  main.textContent = level.main;
  sub.textContent = level.sub + "（推定値）";
  icon.style.color = level.soft;
  title.style.color = level.soft;
  main.style.color = level.soft;
  sub.style.color = level.pale;
  dot.style.background = level.color;
}

function applyRainDisplay(times, precipitation){
  const now = Date.now();
  const items = times.map((t,i)=>({
    time:new Date(t),
    mm:Number(precipitation[i]) || 0
  })).filter(x=>x.time.getTime() >= now - 15*60*1000);

  const nextRain = items.find(x=>x.mm >= 0.1);
  const maxRain = items.slice(0,8).reduce((m,x)=>Math.max(m,x.mm),0);
  const main = document.getElementById("rainMain");
  const sub = document.getElementById("rainSub");
  const panel = document.getElementById("rainPanel");

  if(nextRain){
    const minutes = Math.max(0, Math.round((nextRain.time.getTime()-now)/60000));
    panel.style.borderLeft = "6px solid #38bdf8";
    panel.style.paddingLeft = "12px";
    main.style.color = "#7dd3fc";
    main.textContent = minutes <= 15
      ? "まもなく雨が降る見込みです"
      : "約" + minutes + "分後に雨の見込みです";
    sub.textContent = "今後2時間の最大降水量 " + maxRain.toFixed(1) + "mm / 15分　取得 " + formatHm();
  }else{
    panel.style.borderLeft = "6px solid #22c55e";
    panel.style.paddingLeft = "12px";
    main.style.color = "#86efac";
    main.textContent = "現在、雨雲の接近情報はありません";
    sub.textContent = "今後2時間の降水予測　取得 " + formatHm();
  }
}

async function loadOperationalWeather(){
  const url =
    "https://api.open-meteo.com/v1/forecast" +
    "?latitude=35.6895&longitude=139.6917" +
    "&current=temperature_2m,relative_humidity_2m,shortwave_radiation,wind_speed_10m" +
    "&minutely_15=precipitation" +
    "&forecast_minutely_15=8" +
    "&timezone=Asia%2FTokyo";

  try{
    const res = await fetch(url,{cache:"no-store"});
    if(!res.ok) throw new Error("weather api error");
    const data = await res.json();

    const c = data.current;
    const wbgt = estimateWbgt(
      c.temperature_2m,
      c.relative_humidity_2m,
      c.shortwave_radiation,
      c.wind_speed_10m
    );

    applyHeatDisplay(wbgt, c.time);
    applyRainDisplay(data.minutely_15.time, data.minutely_15.precipitation);
  }catch(error){
    document.getElementById("heatBadge").textContent = "取得エラー";
    document.getElementById("heatMain").textContent = "暑さ指数を取得できませんでした";
    document.getElementById("heatSub").textContent = "通信状態を確認してください";
    document.getElementById("rainMain").textContent = "雨雲情報を取得できませんでした";
    document.getElementById("rainSub").textContent = "通信状態を確認してください";
    console.error(error);
  }
}

function updateClock(){

  const now = new Date();

  const week = ["日","月","火","水","木","金","土"];

  document.getElementById("clock").innerHTML =
    now.getFullYear() + "年" +
    (now.getMonth()+1) + "月" +
    now.getDate() + "日(" +
    week[now.getDay()] + ") " +
    now.toLocaleTimeString("ja-JP");

}

setInterval(updateClock,1000);
updateClock();

function getWeatherText(code){

  const map = {
    0:"☀ 快晴",
    1:"🌤 晴れ",
    2:"⛅ 晴れ時々曇り",
    3:"☁ 曇り",
    45:"🌫 霧",
    48:"🌫 濃霧",
    51:"🌦 小雨",
    61:"🌧 雨",
    63:"🌧 強い雨",
    71:"❄ 雪",
    80:"🌦 にわか雨",
    95:"⛈ 雷雨"
  };

  return map[code] || "天候不明";
}

function getWeatherIcon(code){

  if(code == 0) return "☀";
  if(code <= 2) return "🌤";
  if(code == 3) return "☁";
  if(code >= 51 && code <= 67) return "🌧";
  if(code >= 71 && code <= 77) return "❄";
  if(code >= 80) return "🌦";

  return "？";
}

async function loadWeather(){

  const url =
    "https://api.open-meteo.com/v1/forecast?latitude=35.6895&longitude=139.6917&current=temperature_2m,weather_code&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max,weather_code&forecast_days=8";

  const res = await fetch(url);
  const data = await res.json();

let weekWeather = "";

const weekNames = [
  "日","月","火","水","木","金","土"
];

for(let i=0;i<=6;i++){

  const date = new Date(
    data.daily.time[i]
  );

const day = date.getDay();

let dayColor = "#cccccc";

if(day === 0){
  dayColor = "#ff8080";
}
else if(day === 6){
  dayColor = "#80aaff";
}

  weekWeather += `
    <div style="
      display:inline-block;
      width:45px;
      text-align:center;
      vertical-align:top;
      margin:0 3px;
    ">

      <div style="
        font-size:18px;
      ">
        ${date.getMonth()+1}/${date.getDate()}
      </div>

<div style="
  font-size:16px;
  color:${dayColor};
">
  (${weekNames[day]})
</div>

<div style="
  font-size:28px;
  margin-top:4px;
">
  ${getWeatherIcon(
    data.daily.weather_code[i]
  )}
</div>

<div style="
  font-size:14px;
  margin-top:2px;
  color:#ff8a80;
">
  ${Math.round(
    data.daily.temperature_2m_max[i]
  )}℃
</div>

<div style="
  font-size:14px;
  color:#80caff;
">
  ${Math.round(
    data.daily.temperature_2m_min[i]
  )}℃
</div>

    </div>
  `;

}

document.getElementById("weather").innerHTML = `

<div style="
  font-size:24px;
  font-weight:bold;
  color:#9ca3af;
  margin-bottom:15px;
">

const now = new Date();

<div>

</div>

<div>

</div>

<div class="schedule-cell driver-cell">

</div>

`;

document

  let visitorsHtml = "";

data.visitors
  .slice(0,8)

      <div class="visitor-row">
${
  item.time === "23:59"
    ? "未定"
    : item.time
}
${item.guest}
(${item.person})
      </div>
    `;

  });

if(visitorsHtml === ""){
  visitorsHtml = `
    <div class="visitor-row">
      本日の予定はありません
    </div>
  `;
}

  document.getElementById("visitors").innerHTML =
    visitorsHtml;

  let noticeText = "";

data.notices.forEach(item=>{

  noticeText += "　　" + item.text;

});

if(noticeText === ""){
  noticeText = "連絡事項はありません";
}

const noticeEl = document.getElementById("notice");

noticeEl.innerHTML = noticeText;

// Safari対策
noticeEl.style.animation = "none";

// 再描画を強制
void noticeEl.offsetWidth;

// settingsシートから取得
const telopSpeed =
  data.settings &&
  data.settings.telop_speed
    ? Number(data.settings.telop_speed)
    : 25;

// アニメーション再開
noticeEl.style.animation =
  `scroll ${telopSpeed}s linear infinite`;

}

loadData();
loadWeather();

function updateScreenSaverClock(){

  const now = new Date();

  const week =
    ["日","月","火","水","木","金","土"];

  document.getElementById(
    "screenSaverClock"
  ).innerHTML =

    now.toLocaleTimeString(
      "ja-JP"
    );

  document.getElementById(
    "screenSaverDate"
  ).innerHTML =

    now.getFullYear()+"年"+
    (now.getMonth()+1)+"月"+
    now.getDate()+"日("+
    week[now.getDay()]+")";

//const TEST_POSITION = 5;

const minute = now.getMinutes();
const pos = Math.floor(minute / 5) % 6;

//const pos = TEST_POSITION; //テスト用

const clock = document.getElementById("screenSaverClock");
const date  = document.getElementById("screenSaverDate");

const positions = [
  {top:"50%", left:"50%"}, // 中央
  {top:"25%", left:"75%"}, // 右上
  {top:"75%", left:"25%"}, // 左下
  {top:"25%", left:"25%"}, // 左上
  {top:"75%", left:"75%"}, // 右下
  {top:"50%", left:"50%"}  // 中央
];

const p = positions[pos];

clock.style.position = "absolute";
date.style.position = "absolute";

clock.style.left = p.left;
clock.style.top  = p.top;
clock.style.transform = "translate(-50%,-50%)";

date.style.left = p.left;
date.style.top  = `calc(${p.top} + 90px)`;
date.style.transform = "translate(-50%,0)";

}

function checkScreenSaver(){

  const now = new Date();

  const h = now.getHours();
  const m = now.getMinutes();
  const s = now.getSeconds();

  const saver =
    document.getElementById("screenSaver");

  // 夜間

    if(h>=1 && h<7){
//if(true){

    saver.classList.add("show");

    saver.style.background="#000";

    saver.style.color="#fff";

    document.getElementById(
      "screenSaverDate"
    ).style.color="#ddd";

    updateScreenSaverClock();

    return;

  }

  // 30分ごと30秒

  if(
    (m===0 || m===30)
    &&
    s<30
  ){

    saver.classList.add("show");

    saver.style.background="#fff";

    saver.style.color="#111827";

    document.getElementById(
      "screenSaverDate"
    ).style.color="#4b5563";

    updateScreenSaverClock();

  }
  else{

    saver.classList.remove("show");

  }

}

document.addEventListener("DOMContentLoaded", () => {

  updateScreenSaverClock();
  checkScreenSaver();
  
  loadData();
  loadWeather();
  loadOperationalWeather();

  setInterval(updateScreenSaverClock,1000);
  setInterval(checkScreenSaver,1000);

  setInterval(loadData,30000);
  setInterval(loadWeather,600000);
  setInterval(loadOperationalWeather,600000);

  rotateInfoPanel();
  setInterval(rotateInfoPanel,15000);

});

</script>

<div id="screenSaver">
  <div id="screenSaverClock"></div>
  <div id="screenSaverDate"></div>
</div>
